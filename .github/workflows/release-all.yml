name: Build All Versions and Release

on:
  push:
    tags:
    - "v-all-CN*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        mc_version:
        - "1.20"
        - "1.20.1"
        - "1.20.2"
        - "1.20.3"
        - "1.20.4"
        - "1.20.5"
        - "1.20.6"
        - "1.21"
        - "1.21.1"
        - "1.21.2"
        - "1.21.3"
        - "1.21.4"
        - "1.21.5"
        - "1.21.6"
        - "1.21.7"
        - "1.21.8"
        - "1.21.9"
        - "1.21.10"
        - "1.21.11"
      fail-fast: false
    steps:

    - name: Checkout branch
      uses: actions/checkout@v5
      with:
        ref: mc-${{ matrix.mc_version }}-cn

    - name: Set up Java 21
      uses: actions/setup-java@v5
      with:
        java-version: "21"
        distribution: "microsoft"

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v5

    - name: SpotlessApply
      run: ./gradlew spotlessApply --stacktrace || true

    - name: Build
      run: ./gradlew build -x test -x spotlessCheck --stacktrace

    - name: Remove sources jar
      run: rm -f build/libs/*-sources.jar

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: wurst-mc-${{ matrix.mc_version }}
        path: build/libs/*.jar

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:

    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: all-jars
        merge-multiple: true

    - name: Collect jars (exclude sources)
      run: |
        mkdir -p release-jars
        find all-jars -name '*.jar' ! -name '*-sources.jar' -exec cp {} release-jars/ \;
        ls -la release-jars/

    - name: Get tag name
      id: tag
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          echo "TAG_NAME=v-all-CN-latest" >> $GITHUB_OUTPUT
        else
          echo "TAG_NAME=${{ github.ref_name }}" >> $GITHUB_OUTPUT
        fi

    - name: Create Release
      uses: softprops/action-gh-release@v3
      with:
        tag_name: ${{ steps.tag.outputs.TAG_NAME }}
        name: "Wurst7 中文汉化版 - 全版本合集"
        body: |
          ## Wurst7 中文汉化版 - 全版本合集

          全面中文汉化版本，支持以下 Minecraft 版本：

          **1.20.x**: 1.20, 1.20.1, 1.20.2, 1.20.3, 1.20.4, 1.20.5, 1.20.6
          **1.21.x**: 1.21, 1.21.1, 1.21.2, 1.21.3, 1.21.4, 1.21.5, 1.21.6, 1.21.7, 1.21.8, 1.21.9, 1.21.10, 1.21.11

          ### 安装方法
          1. 安装 [Fabric Loader](https://fabricmc.net/use/installer/)
          2. 下载 [Fabric API](https://modrinth.com/mod/fabric-api) 放入 `mods` 文件夹
          3. 根据你的 Minecraft 版本，下载对应的 jar 文件放入 `mods` 文件夹
          4. 启动游戏

          ### 使用说明
          - 按 **右 Ctrl** 键打开 ClickGUI（点击界面）
          - 按 `.` 键打开命令行
          - 在 Wurst 设置 > 翻译 中关闭 **"强制英语"** 即可显示中文功能描述
        files: release-jars/*.jar
        draft: false
        prerelease: false
